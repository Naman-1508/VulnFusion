name: VulnFusion Security Scan

on:
  repository_dispatch:
    types: [run-scan]

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Security Tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: bin/
          key: ${{ runner.os }}-security-tools-v3

      - name: Cache Nuclei Templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/.nuclei-templates
          key: ${{ runner.os }}-nuclei-templates

      - name: Install Tools (if not cached)
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          # Nuclei
          wget -q https://github.com/projectdiscovery/nuclei/releases/download/v3.3.10/nuclei_3.3.10_linux_amd64.zip -O nuclei.zip
          unzip -o nuclei.zip -d bin/ && chmod +x bin/nuclei
          # Subfinder
          wget -q https://github.com/projectdiscovery/subfinder/releases/download/v2.6.7/subfinder_2.6.7_linux_amd64.zip -O subfinder.zip
          unzip -o subfinder.zip -d bin/ && chmod +x bin/subfinder
          # SQLMap & Nikto
          git clone --depth 1 https://github.com/sqlmapproject/sqlmap.git bin/sqlmap-dir
          git clone --depth 1 https://github.com/sullo/nikto.git bin/nikto-dir
          rm *.zip

      - name: Update Templates (if needed)
        run: ./bin/nuclei -ut -silent

      - name: Install Node Dependencies
        run: npm ci

      - name: Install OS Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 perl python3-pip

      - name: Run Scan Worker
        env:
          SCAN_URL: ${{ github.event.client_payload.url }}
          SCAN_ID: ${{ github.event.client_payload.scan_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PATH: ${{ github.workspace }}/bin:$PATH
        run: node scanner-worker.js
